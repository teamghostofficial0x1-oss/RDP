name: Kali Pentest Pipeline

on:
  push:
    branches: ["main"]

jobs:
  pentest:
    runs-on: ubuntu-latest

    container:
      image: kalilinux/kali-rolling

    steps:
      - name: Update system
        run: |
          apt update && apt upgrade -y

      - name: Install pentest tools
        run: |
          apt install -y \
            curl wget git python3 python3-pip \
            nmap netcat-traditional \
            dnsutils iproute2 iptables \
            sqlmap whois \
            tcpdump \
            net-tools

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale daemon
        run: |
          tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect network
        run: |
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=github-pentest

      - name: Network recon (safe)
        run: |
          echo "==== Network Info ===="
          ip a
          tailscale status

      - name: Nmap scan (example lab target)
        run: |
          mkdir -p results
          nmap -sV -sC -oN results/nmap.txt 10.0.0.1 || true

      - name: DNS recon
        run: |
          nslookup example.com > results/dns.txt || true

      - name: WhoIs lookup
        run: |
          whois example.com > results/whois.txt || true

      - name: SQLMap dry test (NO exploit)
        run: |
          echo "sqlmap placeholder - use only authorized targets"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pentest-report
          path: results