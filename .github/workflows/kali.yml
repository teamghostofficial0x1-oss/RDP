name: Kali + Tailscale Fixed

on:
  push:
    branches: ["main"]

jobs:
  kali:
    runs-on: ubuntu-latest

    container:
      image: kalilinux/kali-rolling

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y curl iproute2 iptables ca-certificates

      - name: Install Tailscale (manual safe way)
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/debian/bullseye.noarmor.gpg \
            | tee /usr/share/keyrings/tailscale.gpg

          echo "deb [signed-by=/usr/share/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/debian bullseye main" \
            > /etc/apt/sources.list.d/tailscale.list

          apt update
          apt install -y tailscale

      - name: Start tailscaled (NO systemd)
        run: |
          tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to network
        run: |
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-kali

      - name: Verify
        run: |
          tailscale status
          ip a