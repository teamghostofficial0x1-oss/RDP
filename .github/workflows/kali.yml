name: Stable Linux SSH + Tailscale Lab

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Update system
        run: |
          sudo apt update && sudo apt upgrade -y

      - name: Install SSH + tools (NO systemctl usage)
        run: |
          sudo apt install -y openssh-server sudo curl nmap netcat-traditional git python3 python3-pip net-tools

      - name: Enable SSH service (safe mode)
        run: |
          sudo service ssh start || true

      - name: Create user (demon)
        run: |
          sudo useradd -m -s /bin/bash demon || true
          echo "demon:notime" | sudo chpasswd
          sudo usermod -aG sudo demon

      - name: Allow SSH password login
        run: |
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo service ssh restart || true

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale (NO systemctl FIX)
        run: |
          sudo tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo tailscale up \
            --authkey=$TAILSCALE_AUTHKEY \
            --hostname=github-linux-lab

      - name: Show IP
        run: |
          tailscale ip -4 || true

      - name: Pentest tools check
        run: |
          nmap --version
          python3 --version

      - name: 6 Hour Countdown Timer
        run: |
          END=$((SECONDS+21600))

          while [ $SECONDS -lt $END ]; do
            REMAIN=$((END-SECONDS))
            H=$((REMAIN/3600))
            M=$(((REMAIN%3600)/60))
            S=$((REMAIN%60))

            echo "⏳ Remaining Time: ${H}h ${M}m ${S}s"
            sleep 60
          done